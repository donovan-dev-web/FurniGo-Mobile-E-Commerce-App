spring.application.name=FurniGo
spring.datasource.url=jdbc:postgresql://localhost:5433/furnigo_db
spring.datasource.username=furnigo
spring.datasource.password=furnigo
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=70469145699-tb7anq6v0a6gr62njutbs8belsun1qp2.apps.googleusercontent.com

# JWT
jwt.secret=dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIEZ1cm5pR28gand0IHRva2Vu
jwt.expiration-ms=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type
cors.allow-credentials=true

# seed data
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# uploads
app.uploads.dir=uploads

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
app.payment.success-url=${APP_PAYMENT_SUCCESS_URL:furnigo://checkout/success?session_id={CHECKOUT_SESSION_ID}}
app.payment.cancel-url=${APP_PAYMENT_CANCEL_URL:furnigo://checkout/cancel}

# Actuator configuration Ping only
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never