<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-stone-50/80 dark:bg-stone-950/80 backdrop-blur-xl docked full-width top-0 z-50">
<div class="flex justify-between items-center w-full px-6 py-4">
<button class="active:scale-98 transition-all hover:opacity-70">
<span class="material-symbols-outlined text-stone-800 dark:text-stone-200" data-icon="menu">menu</span>
</button>
<h1 class="font-['Manrope'] text-2xl font-black text-stone-900 dark:text-stone-50 italic">FurniGo</h1>
<button class="active:scale-98 transition-all hover:opacity-70">
<span class="material-symbols-outlined text-stone-800 dark:text-stone-200" data-icon="search">search</span>
</button>
</div>
</header>
<main class="max-w-xl mx-auto px-6 mt-8">
<!-- Profile Header -->
<section class="flex flex-col items-center text-center mb-12">
<div class="relative mb-6">
<div class="w-28 h-28 rounded-full overflow-hidden border-4 border-surface-container-lowest shadow-sm">
<img class="w-full h-full object-cover" data-alt="portrait of a professional man named Jean Dupont with a friendly expression in a brightly lit modern scandinavian interior" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwP03VW7SoxFtx-TS5d4NIFEWlXDolUjJi2doFy_t3CEuYp1BlQRUoVyThXVAJNBDoGTxvI4jAkeU1mJjV2ilLCY3Kw3pwhCB9gglQvguXFK7FePBy3NZEC4CCXfG7ZH8RaPaYy3SyA1TLyy1RhL9ASdxyaFirTEpCxjxv-Vv9Hy4zwm0LSFD-6NygYKnifcoQm_6whSdJP139_dX9QJbEO0kokycbi1YvAvC3lQSxcqac-RZiGiQcvw11iQtRJo85I68bsiDb1C4"/>
</div>
<div class="absolute bottom-1 right-1 bg-primary text-on-primary p-1.5 rounded-full shadow-lg">
<span class="material-symbols-outlined text-sm" data-icon="edit">edit</span>
</div>
</div>
<h2 class="text-3xl font-extrabold tracking-tight text-on-surface mb-1">Jean Dupont</h2>
<p class="text-on-surface-variant font-medium">jean.dupont@email.com</p>
</section>
<!-- Stats Grid (Editorial Polish) -->
<div class="grid grid-cols-2 gap-4 mb-10">
<div class="bg-surface-container-low p-6 rounded-xl flex flex-col items-center justify-center">
<span class="text-2xl font-bold text-primary">12</span>
<span class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant mt-1">Commandes</span>
</div>
<div class="bg-secondary-container p-6 rounded-xl flex flex-col items-center justify-center">
<span class="text-2xl font-bold text-on-secondary-container">04</span>
<span class="text-[10px] uppercase tracking-widest font-bold text-on-secondary-container mt-1">Favoris</span>
</div>
</div>
<!-- Action List (Minimalist Scandinavian Style) -->
<div class="space-y-3">
<button class="w-full bg-surface-container-lowest p-5 rounded-xl flex items-center justify-between group active:scale-[0.99] transition-all">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-surface-container-low rounded-lg text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="person">person</span>
</div>
<span class="font-semibold text-on-surface">Mes informations personnelles</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full bg-surface-container-lowest p-5 rounded-xl flex items-center justify-between group active:scale-[0.99] transition-all">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-surface-container-low rounded-lg text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="location_on">location_on</span>
</div>
<span class="font-semibold text-on-surface">Adresses de livraison</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full bg-surface-container-lowest p-5 rounded-xl flex items-center justify-between group active:scale-[0.99] transition-all">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-surface-container-low rounded-lg text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="credit_card">credit_card</span>
</div>
<span class="font-semibold text-on-surface">Modes de paiement</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</button>
<div class="py-4 px-2">
<h3 class="text-[10px] font-bold uppercase tracking-[0.2em] text-outline mb-4">Sécurité &amp; Confidentialité</h3>
<div class="space-y-3">
<button class="w-full bg-surface-container-lowest p-5 rounded-xl flex items-center justify-between group active:scale-[0.99] transition-all">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-surface-container-low rounded-lg text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="download">download</span>
</div>
<span class="font-semibold text-on-surface">Exporter mes données (GDPR)</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full bg-surface-container-lowest p-5 rounded-xl flex items-center justify-between group active:scale-[0.99] transition-all">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-surface-container-low rounded-lg text-on-surface-variant group-hover:text-error transition-colors">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</div>
<span class="font-semibold text-on-surface">Supprimer mon compte (GDPR)</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
<button class="w-full bg-surface-container-lowest p-5 rounded-xl flex items-center justify-between group active:scale-[0.99] transition-all border border-error/10 mt-4">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-error-container/20 rounded-lg text-error">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
</div>
<span class="font-bold text-error">Se déconnecter</span>
</div>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-6 pt-3 bg-stone-50/80 dark:bg-stone-950/80 backdrop-blur-xl rounded-t-[24px] shadow-[0_-4px_32px_rgba(45,52,53,0.04)]">
<!-- Home -->
<button class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-4 py-1.5 hover:text-stone-900 dark:hover:text-stone-50 scale-95 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-medium mt-1">Home</span>
</button>
<!-- Cart -->
<button class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-4 py-1.5 hover:text-stone-900 dark:hover:text-stone-50 scale-95 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="shopping_cart">shopping_cart</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-medium mt-1">Cart</span>
</button>
<!-- Orders -->
<button class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-4 py-1.5 hover:text-stone-900 dark:hover:text-stone-50 scale-95 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="package_2">package_2</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-medium mt-1">Orders</span>
</button>
<!-- Profile (ACTIVE) -->
<button class="flex flex-col items-center justify-center bg-stone-200 dark:bg-stone-800 text-stone-900 dark:text-stone-50 rounded-2xl px-4 py-1.5 transition-all scale-95 active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-medium mt-1">Profile</span>
</button>
</nav>
</body></html>
