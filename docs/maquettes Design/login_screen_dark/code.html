<body class="bg-surface text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed overflow-hidden transition-colors duration-300">
<!-- Hero Background Section -->
<div class="fixed inset-0 z-0">
<img alt="Interior design" class="w-full h-full object-cover blur-[2px] opacity-60" data-alt="Luxurious Scandinavian living room with a cream bouclé sofa, light oak coffee table, and soft natural sunlight filtering through linen curtains" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBk0WImsGrC7LNuZCvXeTYm-YCQ6AErWIACUkxgfy8q5jdH9rPRAEF2TtqMaGuNH79rc7Daa2ErOxZ5ZOadg-jmDxGYHOHT1BwOmzfaNXatrl8GK83GEZ-RkXACYa9EnoCI7-h1c9_AothZ6j84VcoOieeEiwjgPflaLs_GUZ-UyoJFpZzLOs0honlu0VCLWFTeQtnddgi-FDingiM8CaLOdWS-Hd8JevUlqcbK-y7phFGkz9DQG642S_OznyZOdHtzFST7-IRCkng"/>
<div class="absolute inset-0 editorial-overlay"></div>
</div>
<!-- Main Content Shell -->
<main class="relative z-10 flex min-h-screen items-center justify-center p-6">
<div class="w-full max-w-md">
<!-- Branding Area -->
<div class="text-center mb-12">
<h2 class="font-headline text-3xl font-black italic tracking-tighter text-on-surface mb-2">
                FurniGo
            </h2>
<div class="w-8 h-[2px] bg-primary mx-auto mb-8"></div>
<h1 class="font-headline text-4xl font-extrabold text-on-surface tracking-tight mb-4 leading-tight">
                Bienvenue chez FurniGo
            </h1>
<p class="text-on-surface-variant font-body text-base max-w-[280px] mx-auto leading-relaxed">
                Connectez-vous pour commencer votre expérience.
            </p>
</div>
<!-- Interaction Card -->
<div class="bg-surface-container-lowest/40 backdrop-blur-2xl rounded-3xl p-8 shadow-[0_32px_64px_-12px_rgba(0,0,0,0.4)] border border-outline-variant/10">
<!-- Primary Action: Google Login -->
<button class="w-full group flex items-center justify-center gap-4 bg-on-surface text-surface py-4 px-6 rounded-2xl transition-all duration-300 active:scale-95 hover:brightness-110 mb-4 shadow-lg shadow-on-surface/5">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>

<span class="font-headline font-bold text-sm tracking-wide">Se connecter avec Google</span>
</button>
<!-- Divider -->
<div class="flex items-center gap-4 py-4">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="text-[10px] font-label font-bold uppercase tracking-widest text-outline-variant">Ou</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Secondary Actions -->
<div class="space-y-3">
<button class="w-full flex items-center justify-center gap-2 py-4 px-6 rounded-2xl bg-surface-container-low/60 border border-outline-variant/10 text-on-surface font-headline font-bold text-sm transition-all hover:bg-surface-container-high active:scale-98">
<span class="material-symbols-outlined text-xl" data-icon="mail">mail</span>
                    Continuer avec l'e-mail
                </button>
<button class="w-full py-4 px-6 rounded-2xl text-on-surface-variant font-label font-medium text-sm transition-all hover:text-on-surface">
                    Continuer en tant qu'invité
                </button>
</div>
</div>
<!-- Sign Up Prompt -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant font-body text-sm">
                Pas encore de compte ? 
                <a class="text-primary font-bold ml-1 hover:underline decoration-2 underline-offset-4" href="#">
                    Créer un compte
                </a>
</p>
</div>
<!-- Footer Legal -->
<div class="mt-16 text-center">
<div class="flex justify-center gap-6 mb-4">
<a class="text-[10px] font-label font-medium uppercase tracking-widest text-outline hover:text-on-surface transition-colors" href="#">Confidentialité</a>
<a class="text-[10px] font-label font-medium uppercase tracking-widest text-outline hover:text-on-surface transition-colors" href="#">Conditions</a>
<a class="text-[10px] font-label font-medium uppercase tracking-widest text-outline hover:text-on-surface transition-colors" href="#">Aide</a>
</div>
</div>
</div>
</main>
<!-- Floating Material Aesthetic Element (Asymmetric Detail) -->
<div class="fixed -bottom-12 -right-12 w-64 h-64 bg-secondary-container/30 rounded-full blur-3xl z-0 pointer-events-none"></div>
<div class="fixed -top-12 -left-12 w-96 h-96 bg-primary-container/20 rounded-full blur-3xl z-0 pointer-events-none"></div>
