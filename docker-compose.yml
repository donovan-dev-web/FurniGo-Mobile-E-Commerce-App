version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: furnigo-postgres
    restart: always
    environment:
      POSTGRES_USER: furnigo
      POSTGRES_PASSWORD: furnigo
      POSTGRES_DB: furnigo_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: